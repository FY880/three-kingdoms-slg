<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>三国 SLG · 手机版 Demo</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:#11141a; color:#e6e6e6;
    font-family:"Microsoft YaHei",system-ui,sans-serif; user-select:none; }
  #app { display:flex; flex-direction:column; height:100%; max-width:1080px; margin:0 auto; background:#11141a; }
  #top { display:flex; gap:6px; padding:6px 8px; background:#23282f; align-items:center; flex-wrap:wrap; }
  #top b { font-size:14px; margin-right:2px; }
  .tag { background:#3a414b; padding:3px 8px; border-radius:10px; font-size:12px; white-space:nowrap; }
  #mapWrap { position:relative; flex:1; overflow:hidden; }
  canvas { display:block; width:100%; height:100%; background:#0e1116; touch-action:none; }
  #bottombar { display:flex; gap:6px; padding:8px; background:#23282f; padding-bottom:calc(8px + env(safe-area-inset-bottom)); }
  #bottombar button { flex:1; min-height:46px; font-size:14px; border:none; border-radius:8px; color:#fff; background:#3d7bd6; }
  #bottombar button.alt { background:#4a525c; }
  #bottombar button.on { background:#d68a3d; }
  /* 上滑详情面板 */
  #sheet { position:fixed; left:0; right:0; bottom:0; max-height:62%; background:#1c2128; border-top:2px solid #3d7bd6;
    border-radius:14px 14px 0 0; transform:translateY(100%); transition:transform .22s ease; z-index:20; padding:12px 14px calc(14px + env(safe-area-inset-bottom)); overflow:auto; }
  #sheet.show { transform:translateY(0); }
  #sheet h3 { margin:4px 0 6px; font-size:14px; color:#9ec5ff; }
  #sheet .close { position:absolute; right:12px; top:10px; background:#3a414b; color:#fff; border:none; border-radius:6px; padding:4px 10px; font-size:13px; }
  #info { font-size:13px; line-height:1.7; }
  #log { font-size:12px; line-height:1.6; max-height:180px; overflow:auto; background:#15191f; padding:8px; border-radius:6px; }
  .score { display:flex; gap:8px; margin:6px 0; }
  .score div { flex:1; text-align:center; background:#2c323b; border-radius:6px; padding:6px 2px; }
  .score b { display:block; font-size:18px; }
  .legend { font-size:11px; line-height:1.5; display:grid; grid-template-columns:1fr 1fr; gap:2px 10px; margin-top:6px; }
  .legend i { display:inline-block; width:10px; height:10px; margin-right:4px; vertical-align:middle; }
  .hint { color:#ffd479; font-size:12px; } .win{color:#7CFC8A;} .lose{color:#ff7b7b;}
  /* 外交面板 */
  #dipSheet { position:fixed; left:0; right:0; bottom:0; max-height:70%; background:#1c2128; border-top:2px solid #6a5acd;
    border-radius:14px 14px 0 0; transform:translateY(100%); transition:transform .22s ease; z-index:25; padding:12px 14px calc(14px + env(safe-area-inset-bottom)); overflow:auto; }
  #dipSheet.show { transform:translateY(0); }
  #dipSheet h3 { margin:4px 0 6px; font-size:14px; color:#b9a8ff; }
  #dipSheet .close { position:absolute; right:12px; top:10px; background:#3a414b; color:#fff; border:none; border-radius:6px; padding:4px 10px; font-size:13px; }
  .dipRow { background:#2c323b; border-radius:8px; padding:8px 10px; margin-bottom:8px; }
  .dipRow .dipTitle { margin-bottom:6px; font-size:13px; }
  .dipBtns { display:flex; gap:6px; }
  .dipBtns button { flex:1; min-height:36px; font-size:13px; border:none; border-radius:7px; color:#fff; background:#4a525c; }
  .dipBtns button.on { background:#6a5acd; }
  .dipBtns button.rival.on { background:#d24b4b; }
  .dipNote { font-size:12px; color:#9aa4b0; line-height:1.6; }
  /* 剧本选择面板 */
  #scnSheet { position:fixed; left:0; right:0; bottom:0; max-height:74%; background:#1c2128; border-top:2px solid #d68a3d;
    border-radius:14px 14px 0 0; transform:translateY(100%); transition:transform .22s ease; z-index:26; padding:12px 14px calc(14px + env(safe-area-inset-bottom)); overflow:auto; }
  #scnSheet.show { transform:translateY(0); }
  #scnSheet h3 { margin:4px 0 6px; font-size:14px; color:#ffcf9a; }
  #scnSheet .close { position:absolute; right:12px; top:10px; background:#3a414b; color:#fff; border:none; border-radius:6px; padding:4px 10px; font-size:13px; }
  .scnPick { display:block; width:100%; margin-top:8px; min-height:38px; font-size:13px; border:none; border-radius:7px; color:#fff; background:#4a525c; }
  .scnPick.on { background:#d68a3d; }
  #toast { position:fixed; left:50%; top:14%; transform:translateX(-50%); background:rgba(0,0,0,.8); padding:8px 14px;
    border-radius:8px; font-size:13px; z-index:30; opacity:0; transition:opacity .2s; pointer-events:none; max-width:86%; text-align:center;}
  #toast.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <div id="top">
    <b>三国SLG</b>
    <span class="tag" id="tSeason">春</span>
    <span class="tag" id="tWeather">晴</span>
    <span class="tag" id="tTime">时辰0</span>
    <span class="tag" id="tLand">领地0</span>
    <span class="tag" id="tEnemy">敌0</span>
  </div>
  <div id="mapWrap"><canvas id="cv"></canvas></div>
  <div id="bottombar">
    <button id="btnTime">推进时辰</button>
    <button id="btnAmbush" class="alt">伏兵</button>
    <button id="btnFlood" class="alt">水攻</button>
    <button id="btnDiplomacy" class="alt">外交</button>
    <button id="btnScenario" class="alt">剧本</button>
    <button id="btnReload" class="alt">配表</button>
    <button id="btnReset" class="alt">重置</button>
  </div>
</div>
<div id="sheet">
  <button class="close" onclick="closeSheet()">收起</button>
  <h3>详情 / 庙算</h3>
  <div id="info">点地图查看。点<b>黄色高亮</b>地块出征（连地规则）。拖动平移，双指缩放。</div>
  <div id="miao"></div>
  <h3>战报</h3>
  <div id="log"></div>
  <h3>地形图例</h3>
  <div class="legend" id="legend"></div>
</div>
<div id="toast"></div>
<div id="dipSheet">
  <button class="close" onclick="closeDiplomacy()">收起</button>
  <h3>外交 · 诸侯盟约</h3>
  <div class="dipNote">同盟：与该诸侯互不侵犯（其不会攻你，你亦不可攻它）。敌对：你与盟友将优先夹击该诸侯（拉一个 AI 打另一个）。</div>
  <div id="dipBody" style="margin-top:8px"></div>
</div>
<div id="scnSheet">
  <button class="close" onclick="closeScenario()">收起</button>
  <h3>选择剧本</h3>
  <div class="dipNote">不同剧本的诸侯、出生点、中立强度与胜负条件各不相同。切换即重开一局。</div>
  <div id="scnBody"></div>
</div>

<!-- 纯逻辑层（UMD 模块，按依赖顺序加载；rules.js 为聚合入口并暴露 window.RULES） -->
<script src="src/util.js"></script>
<script src="src/data.js"></script>
<script src="src/combat.js"></script>
<script src="src/diplomacy.js"></script>
<script src="src/scenario.js"></script>
<script src="src/rules.js"></script>
<script>
const R = window.RULES;
const W=80, H=56, CS=16;                 // 大地图：80×56
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const wrap=document.getElementById('mapWrap');

// 相机（世界像素坐标左上角 + 缩放）
let camX=0, camY=0, zoom=1;

// ---- 随机 ----
let seed=12345; function rnd(){ seed=(seed*1103515245+12345)&0x7fffffff; return seed/0x7fffffff; }
function ri(a,b){ return Math.floor(a+rnd()*(b-a+1)); }
function pickW(w){ const tot=Object.values(w).reduce((s,v)=>s+v,0); let r=rnd()*tot; for(const k in w){ r-=w[k]; if(r<=0) return k; } return Object.keys(w)[0]; }

// ---- 地图 ----
let map=[], seasonKey='spring', weatherKey='sun', time=0, ambushMode=false, floodMode=false, diplomacyMode=false;
let TK=Object.keys(R.TERRAIN);
function refreshDataRefs(){ TK=Object.keys(R.TERRAIN); }

// ---- AI 诸侯势力（剧本驱动，运行时由 applyScenario 填充）----
// 性格：侵略(爱打玩家/扩张猛) / 稳健(守成少出击) / 外交(结盟倾向、少打玩家) / 霸权(滚雪球、集火最强者)
let AI_LORDS=[];
const LORD_BY_ID={};
const ROSTER=['cao1','guan1','zhao1','zhu1','zhou1'];
function isAI(o){ return o&&o.startsWith('ai_'); }
function lordById(o){ return LORD_BY_ID[o]; }

// 剧本 / 运行状态
let SCN=null;                 // 当前剧本
let playerHome=[8,50];
let appliedEvents={};        // 已触发剧本事件（防重复）
let gameOver=false;          // 本局是否已结束
let DIP=null;                // 外交关系（applyScenario 重建）
const GLYPH={mountain:'山',forest:'林',river:'水',city:'城',swamp:'泽',lowland:'洼',hill:'丘',defile:'峡',desert:'沙',tundra:'雪',bridge:'桥',plain:''};
// 应用剧本：填充诸侯、重建外交关系、重置信誉
function applyScenario(id){
  SCN = R.getScenario(id) || R.SCENARIOS[0];
  AI_LORDS = SCN.lords.map(l=>({...l}));
  Object.keys(LORD_BY_ID).forEach(k=>delete LORD_BY_ID[k]);
  AI_LORDS.forEach(l=>LORD_BY_ID[l.id]=l);
  DIP = R.createDiplomacy(['player', ...AI_LORDS.map(l=>l.id)]);
  reputation=50; playerHome=SCN.playerHome.slice(); appliedEvents={}; gameOver=false;
  initRelations();
}
function startScenario(id){ applyScenario(id); genMap(); buildLegend(); refreshTop(); render(); closeScenario(); toast('剧本【'+SCN.name+'】'+SCN.desc); log('📜 剧本【'+SCN.name+'】'+SCN.desc); }
// 调试/测试访问器：返回内部状态引用（供冒烟测试与调试，不影响玩法）
function getState(){ return {map, SCN, playerHome, DIP, gameOver, AI_LORDS, appliedEvents}; }

// ---- 外交 / 同盟（以 rules.js 的 DIP 纯逻辑模型为唯一真相源）----
// 关系状态：'ally' 同盟(互不侵犯) | 'neutral' 中立 | 'rival' 敌对(用于“拉一个 AI 打另一个”)
let reputation=50;                  // 信誉：背盟降低，低则更易被诸侯攻
function initRelations(){
  AI_LORDS.forEach(L=> R.setRelation(DIP,'player',L.id,'neutral'));
  for(let i=0;i<AI_LORDS.length;i++) for(let j=i+1;j<AI_LORDS.length;j++){
    R.setRelation(DIP, AI_LORDS[i].id, AI_LORDS[j].id, Math.random()<0.3?'ally':'neutral');
  }
}
// 玩家设置与某诸侯的关系；敌对(war)时让所有盟友也视其为敌（共同讨伐）
function playerSetRel(b, s){
  const prev = R.getRelation(DIP,'player',b);
  const next = (s==='war') ? 'rival' : s;   // s 可为 ally/neutral/war/vassal
  R.setRelation(DIP,'player',b,next);
  if(s==='war'){
    AI_LORDS.forEach(L=>{ if(L.id!==b && R.isAlly(DIP,'player',L.id)) R.setRelation(DIP,L.id,b,'rival'); });
  } else if(s==='vassal'){
    // 附庸：该诸侯臣服于你，并与其与你盟友也结盟
    AI_LORDS.forEach(L=>{ if(L.id!==b && R.isAlly(DIP,'player',L.id)) R.setRelation(DIP,L.id,b,'ally'); });
  } else if(prev==='rival'){
    AI_LORDS.forEach(L=>{ if(L.id!==b && R.isAlly(DIP,'player',L.id) && R.isRival(DIP,L.id,b)) R.setRelation(DIP,L.id,b,'neutral'); });
  }
  if(prev==='ally' && s!=='ally' && s!=='vassal') reputation=Math.max(0,reputation-10);   // 背盟损信誉
  if(s==='ally' && prev!=='ally')  reputation=Math.min(100,reputation+5);
  if(s==='vassal' && prev!=='vassal') reputation=Math.min(100,reputation+3);
  openDiplomacy();
}

// 任意地块的守军（玩家/AI/中立统一）
function defenderArmy(tile){
  if(tile.owner==='player'){ const u=ROSTER.slice(0,3).map((id,i)=>R.makeUnit(id,1400,i===0?'fengshi':(i===1?'heyi':'yulin'),{morale:85})); return {units:u,total:4200}; }
  if(isAI(tile.owner)){ const L=lordById(tile.owner); const u=L.gen.map((id,i)=>R.makeUnit(id,L.strength,i===0?'fengshi':'heyi',{morale:80})); return {units:u,total:L.strength*3}; }
  const pool=['lv1','zhang1','huang1','sun1','sima1','liu1'];
  const n=Math.min(3,1+Math.floor(tile.lvl/2)); const u=[];
  for(let i=0;i<n;i++){ const g=pool[ri(0,pool.length-1)]; u.push(R.makeUnit(g,Math.round(tile.soldiers/Math.max(1,n)),i===0?'fangyuan':'yulin',{morale:75})); }
  return {units:u,total:tile.soldiers};
}

// AI 评分：打不打得赢 + 目标价值 + 性格偏好 + 外交关系
function scoreTarget(lord,t,def,x,y){
  const myPower=lord.strength*3;
  const isPlayer=(t.owner==='player');
  if(isPlayer){
    if(R.isAlly(DIP,'player',lord.id)) return 0;                       // 同盟互不侵犯
    const base=(lord.personality==='侵略'||lord.personality==='霸权')?1.05:(lord.personality==='稳健'?9.9:6.0);
    const rep=reputation<40?0.85:1.0;                                  // 信誉低更易被攻
    if(myPower < def.total*base*rep) return 0;
  } else {
    if(t.owner!=='none' && R.isAlly(DIP,lord.id,t.owner)) return 0;    // 不攻盟友
    if(myPower < def.total*1.15) return 0;
  }
  let s=1;
  if(R.isRival(DIP,lord.id,t.owner)) s += 5;                           // 共同讨伐：优先夹击敌对诸侯
  if(t.owner==='none') s += 2+t.lvl;
  else if(isPlayer) s += (lord.personality==='霸权')?12:8;
  else s += (lord.personality==='霸权')?8:2;                           //  rival AI
  if(t.t==='plain' && (lord.personality==='侵略'||lord.personality==='霸权')) s+=2;
  if(t.t==='city') s+=3;
  // 包抄：有盟友亦视该目标为敌且与之相邻 → 协同夹击加成（多线合围）
  if(x!==undefined && t.owner!=='none' && R.isRival(DIP,lord.id,t.owner)){
    for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){ const n=map[y+dy]&&map[y+dy][x+dx];
      if(n&&isAI(n.owner)&&n.owner!==lord.id&&R.isAlly(DIP,lord.id,n.owner)&&R.isRival(DIP,n.owner,t.owner)){ s+=4; break; } }
  }
  return s;
}
function aiAttack(lord,cand){
  const tile=map[cand.y][cand.x];
  const defGen = (cand.def && cand.def.units && cand.def.units[0]) ? cand.def.units[0].g : null;
  const attGen = (lord.gen && lord.gen[0]) ? R.GENERALS.find(g=>g.id===lord.gen[0]) : null;
  const fk = R.chooseFormation(attGen, defGen, tile.t);   // 针对克制选阵法
  const att=lord.gen.map((id,i)=>R.makeUnit(id,lord.strength,i===0?fk:'heyì',{morale:80}));
  const res=R.simulateCombat(att, cand.def.units, {terrain:tile.t, weather:weatherKey, ambush:false, floodActive:tile.floodTurns>0});
  if(res.result.includes('攻')){
    const wasPlayer = tile.owner==='player';
    tile.owner=lord.id; tile.lvl=0; tile.soldiers=0; tile.ambush=false;
    if(wasPlayer) log(`⚠️ 【${lord.name}】攻占了你的领地！`,'lose');
  } else if(tile.owner==='none'){ tile.soldiers=Math.max(0, tile.soldiers - Math.round(cand.def.total*0.12)); }
}
function aiTurn(){
  AI_LORDS.forEach(lord=>{
    lord.strength=Math.min(3200, lord.strength + ri(12,34));   // 随回合缓慢变强
    const cands=[];
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){ if(map[y][x].owner!==lord.id) continue;
      for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){ const nx=x+dx,ny=y+dy; if(nx<0||ny<0||nx>=W||ny>=H)continue;
        const t=map[ny][nx]; if(t.owner===lord.id)continue;
        const def=defenderArmy(t); const sc=scoreTarget(lord,t,def,nx,ny); if(sc>0) cands.push({x:nx,y:ny,score:sc,def,src:x+','+y}); } }
    // 多线铺路：同时从不同出发格选目标，展开多条前线（侵略/霸权更激进）
    const maxActs = (lord.personality==='侵略'||lord.personality==='霸权')?3:2;
    if(cands.length){
      cands.sort((a,b)=>b.score-a.score);
      const usedSrc={}, chosen=[];
      for(const c of cands){ if(chosen.length>=maxActs) break; if(usedSrc[c.src]) continue; usedSrc[c.src]=1; chosen.push(c); }
      for(const c of chosen) aiAttack(lord,c);
    }
    // 被夹击求援：领地较上回合锐减 → 令盟友夹击最强威胁者（缓解压力）
    const curLand=landCount(lord.id);
    if(lord.lastLand!==undefined && curLand < lord.lastLand - 6){
      const ally=AI_LORDS.find(L=>L.id!==lord.id && R.isAlly(DIP,lord.id,L.id));
      const threat=AI_LORDS.filter(L=>L.id!==lord.id).sort((a,b)=>landCount(b.id)-landCount(a.id))[0];
      if(ally && threat && !R.isRival(DIP,ally.id,threat.id)){ R.setRelation(DIP,ally.id,threat.id,'rival'); log('🆘 '+lord.name+' 遭夹击，求援 '+ally.name+' 夹击 '+threat.name,'lose'); }
    }
    lord.lastLand=curLand;
  });
  // 水攻持续结算（每回合一次）+ 被淹非玩家领地易主
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const c=map[y][x]; if(c.floodTurns>0){ R.tickFlood(c,weatherKey); if(c.soldiers<=0 && c.owner!=='player'){ c.owner='player'; c.lvl=0; } } }
  updateUpstream(); refreshTop();
}
function genMap(){
  seed=12345; time=0; seasonKey='spring'; weatherKey='sun'; appliedEvents={}; gameOver=false; map=[];
  for(let y=0;y<H;y++){ const row=[]; for(let x=0;x<W;x++){
    let t='plain'; const r=rnd();
    if(r<0.12)t='mountain'; else if(r<0.22)t='forest'; else if(r<0.30)t='hill';
    else if(r<0.36)t='swamp'; else if(r<0.40)t='desert';
    row.push({t,owner:'none',lvl:0,soldiers:0,ambush:false,upstream:false});
  } map.push(row); }
  let ry=ri(18,38);
  for(let x=0;x<W;x++){ ry=Math.max(6,Math.min(H-6,ry+ri(-1,1)));
    for(let dy=0;dy<2;dy++){ const yy=ry+dy; if(map[yy]&&map[yy][x]) map[yy][x].t='river'; }
    if(map[ry+3]&&map[ry+3][x]&&rnd()<0.5) map[ry+3][x].t='lowland'; }
  (SCN.cities||[[10,10],[70,46],[40,28],[16,50]]).forEach(([x,y])=>{ if(map[y]&&map[y][x]) map[y][x].t='city'; });
  paint(playerHome[0],playerHome[1],3,'player'); AI_LORDS.forEach(L=> paint(L.home[0],L.home[1],3,L.id));
  const nmul = SCN.neutralMul||1;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const c=map[y][x];
    if(c.owner==='none'&&c.t!=='river'){ c.lvl=ri(1,5); c.soldiers=Math.round(c.lvl*ri(200,360)*nmul); } }
  updateUpstream(); centerCam(playerHome[0],playerHome[1]); refreshTop();
}
function paint(cx,cy,r,owner){ for(let y=cy-r;y<=cy+r;y++)for(let x=cx-r;x<=cx+r;x++){ if(map[y]&&map[y][x]&&((x-cx)**2+(y-cy)**2)<=r*r){ const c=map[y][x]; if(c.t==='river')continue; c.owner=owner; c.lvl=0; c.soldiers=0; } } }
function updateUpstream(){ for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const c=map[y][x]; c.upstream=false;
  if(c.t==='lowland'&&c.owner!=='player'){ for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){ const n=map[y+dy]&&map[y+dy][x+dx]; if(n&&n.t==='river'&&n.owner==='player') c.upstream=true; } } } }
function scouted(x,y){ for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){ const n=map[y+dy]&&map[y+dy][x+dx]; if(n&&n.owner==='player') return true; } return map[y][x].owner==='player'; }
function validTarget(x,y,dip){ if(map[y][x].owner==='player') return false;
  for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){ const n=map[y+dy]&&map[y+dy][x+dx]; if(n&&n.owner==='player') return true; }
  // 借道行军：目标与盟友相邻，且该盟友又与我方相邻 → 可经盟友领地出击
  if(dip){ for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){ const n=map[y+dy]&&map[y+dy][x+dx];
    if(n&&isAI(n.owner)&&R.isAlly(dip,'player',n.owner)){
      for(const[dx2,dy2]of[[1,0],[-1,0],[0,1],[0,-1]]){ const m=map[(y+dy)+dy2]&&map[(y+dy)+dy2][(x+dx)+dx2]; if(m&&m.owner==='player') return true; } } }
  }
  return false; }

// ---- 相机（支持缓动）----
let camTX=0, camTY=0, camEase=false;
function centerCam(cx,cy){ camX=cx*CS-cv.width/2; camY=cy*CS-cv.height/2; camTX=camX; camTY=camY; clampCam(); }
function clampCam(){ camX=Math.max(0,Math.min(W*CS-cv.width,camX)); camY=Math.max(0,Math.min(H*CS-cv.height,camY)); }
function clampCamTarget(){ camTX=Math.max(0,Math.min(W*CS-cv.width,camTX)); camTY=Math.max(0,Math.min(H*CS-cv.height,camTY)); }
// 镜头缓动：把镜头平滑移到目标格（战斗时聚焦）
function panTo(cx,cy){ camTX=cx*CS-cv.width/2; camTY=cy*CS-cv.height/2; clampCamTarget(); camEase=true; ensureAnim(); }

// ---- 渲染（仅可视区域）----
function render(){
  if(!map||!map.length){ ctx.fillStyle='#0e1116'; ctx.fillRect(0,0,cv.width,cv.height); return; }
  ctx.fillStyle='#0e1116'; ctx.fillRect(0,0,cv.width,cv.height);
  const x0=Math.max(0,Math.floor(camX/CS)), x1=Math.min(W-1,Math.ceil((camX+cv.width)/CS));
  const y0=Math.max(0,Math.floor(camY/CS)), y1=Math.min(H-1,Math.ceil((camY+cv.height)/CS));
  const cs=CS*zoom;
  const shx = shake>0 ? (Math.random()-0.5)*shake : 0, shy = shake>0 ? (Math.random()-0.5)*shake : 0;
  ctx.save(); ctx.translate(shx,shy);
  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
    const c=map[y][x]; const vis=scouted(x,y); const px=Math.round(x*CS-camX), py=Math.round(y*CS-camY);
    if(!vis){ ctx.fillStyle='#14181e'; ctx.fillRect(px,py,cs+1,cs+1); continue; }
    ctx.fillStyle=R.TERRAIN[c.t].color; ctx.fillRect(px,py,cs+1,cs+1);
    // 地形字形（缩放足够才画，低成本高辨识）
    if(GLYPH[c.t] && cs>=15){ ctx.fillStyle='rgba(20,25,30,.55)'; ctx.font='bold '+Math.floor(cs*0.62)+'px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(GLYPH[c.t], px+cs/2, py+cs/2); ctx.textAlign='left'; ctx.textBaseline='alphabetic'; }
    if(c.owner==='player'){ ctx.fillStyle='rgba(60,130,220,.42)'; ctx.fillRect(px,py,cs+1,cs+1); }
    else { const L=lordById(c.owner); if(L){ ctx.fillStyle=L.color; ctx.globalAlpha=0.5; ctx.fillRect(px,py,cs+1,cs+1); ctx.globalAlpha=1; } }
    // 势力边界（仅在与邻格归属不同处描边，使领地轮廓清晰）
    if(c.owner!=='none' && cs>=12){
      ctx.strokeStyle = c.owner==='player' ? 'rgba(120,180,255,.9)' : (lordById(c.owner)?lordById(c.owner).color:'#fff');
      ctx.globalAlpha=0.9; ctx.lineWidth=1;
      if(!sameOwner(x,y-1,c.owner)){ ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+cs+1,py); ctx.stroke(); }
      if(!sameOwner(x,y+1,c.owner)){ ctx.beginPath(); ctx.moveTo(px,py+cs+1); ctx.lineTo(px+cs+1,py+cs+1); ctx.stroke(); }
      if(!sameOwner(x-1,y,c.owner)){ ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+cs+1); ctx.stroke(); }
      if(!sameOwner(x+1,y,c.owner)){ ctx.beginPath(); ctx.moveTo(px+cs+1,py); ctx.lineTo(px+cs+1,py+cs+1); ctx.stroke(); }
      ctx.globalAlpha=1;
    }
    if(c.owner!=='player'&&c.soldiers>0&&cs>=14){ ctx.fillStyle='#fff'; ctx.font=Math.floor(cs*0.55)+'px sans-serif'; ctx.textAlign='center'; ctx.fillText(c.soldiers>=1000?(c.soldiers/1000).toFixed(0)+'k':c.soldiers, px+cs/2, py+cs*0.72); ctx.textAlign='left'; }
    if(c.ambush&&c.owner==='player'){ ctx.fillStyle='#ffd479'; ctx.fillRect(px+cs/2-2,py+cs/2-2,4,4); }
    if(c.upstream){ ctx.fillStyle='#7fd6ff'; ctx.font=Math.floor(cs*0.5)+'px sans-serif'; ctx.fillText('水',px+2,py+cs-3); }
    if(c.t==='city'){ ctx.fillStyle='#222'; ctx.font=Math.floor(cs*0.6)+'px sans-serif'; ctx.textAlign='center'; ctx.fillText('城',px+cs/2,py+cs*0.62); ctx.textAlign='left'; }
  }
  if(!ambushMode&&!floodMode&&cs>=12){ ctx.strokeStyle='rgba(255,212,121,.9)'; ctx.lineWidth=1;
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){ if(validTarget(x,y)){ const px=x*CS-camX,py=y*CS-camY; ctx.strokeRect(px+1,py+1,cs-2,cs-2); } } }
  drawFx();
  ctx.restore();
  drawWeather();
}
function drawFx(){
  for(const f of fxList){ const a=1-f.t/f.life; const px=f.x*CS-camX, py=f.y*CS-camY, cs=CS*zoom;
    if(f.type==='flash'){ ctx.strokeStyle = f.win?`rgba(124,252,138,${a})`:`rgba(255,123,123,${a})`; ctx.lineWidth=3; ctx.strokeRect(px+2,py+2,cs-4,cs-4); }
    else if(f.type==='text'){ ctx.fillStyle=f.color; ctx.globalAlpha=a; ctx.font='bold '+Math.floor(cs*0.6)+'px sans-serif'; ctx.textAlign='center'; ctx.fillText(f.text, px+cs/2, py+cs*0.5); ctx.globalAlpha=1; ctx.textAlign='left'; }
  }
}
function sameOwner(x,y,owner){ const c = (map[y]&&map[y][x]); return c && c.owner===owner; }
// 天气表现层：全屏色调 + 轻量粒子（晴无；雨/雪/雾/风/旱各有反馈）
function drawWeather(){
  const w=weatherKey;
  const tint={rain:'rgba(80,120,180,.18)',snow:'rgba(220,230,245,.22)',fog:'rgba(180,190,200,.30)',wind:'rgba(200,210,220,.06)',drought:'rgba(220,150,60,.14)',sun:null}[w];
  if(tint){ ctx.fillStyle=tint; ctx.fillRect(0,0,cv.width,cv.height); }
  const N=70;
  for(let i=0;i<N;i++){
    if(w==='rain'){ const px=(i*53+weatherPhase*9)%cv.width, py=(i*97+weatherPhase*22)%cv.height; ctx.strokeStyle='rgba(170,200,255,.5)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px-4,py+12); ctx.stroke(); }
    else if(w==='snow'){ const px=(i*61+weatherPhase*2)%cv.width, py=(i*43+weatherPhase*3)%cv.height; ctx.fillStyle='rgba(255,255,255,.85)'; ctx.fillRect(px,py,2,2); }
    else if(w==='fog'){ const px=(i*70+weatherPhase)%cv.width, py=(i*50)%cv.height; ctx.fillStyle='rgba(205,210,215,.12)'; ctx.beginPath(); ctx.arc(px,py,16,0,7); ctx.fill(); }
    else if(w==='wind'){ const px=(i*40+weatherPhase*16)%cv.width, py=(i*80)%cv.height; ctx.strokeStyle='rgba(230,235,240,.25)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+16,py-2); ctx.stroke(); }
    else if(w==='drought'){ const px=(i*90+weatherPhase*5)%cv.width, py=(i*55+Math.round(Math.sin(i+weatherPhase*0.1)*8))%cv.height; ctx.strokeStyle='rgba(255,200,120,.18)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+10,py); ctx.stroke(); }
  }
  // 全屏滤镜：雾/旱加暗角(vignette)，强化氛围且不依赖美术资源
  if(w==='fog'||w==='drought'){
    const g=ctx.createRadialGradient(cv.width/2,cv.height/2,Math.min(cv.width,cv.height)*0.25, cv.width/2,cv.height/2,Math.max(cv.width,cv.height)*0.7);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1, w==='fog'?'rgba(170,180,190,.5)':'rgba(60,40,10,.5)');
    ctx.fillStyle=g; ctx.fillRect(0,0,cv.width,cv.height);
  }
}
let weatherPhase=0, rafOn=false, lastFrame=0, shake=0;
let fxList=[];   // 战斗特效：闪光 / 浮动文字
function addBattleFx(x,y,res){
  const win=res.result.includes('攻');
  fxList.push({type:'flash',x,y,t:0,life:16,win});
  fxList.push({type:'text',x,y,t:0,life:34,text:win?'占领!':'受挫',color:win?'#7CFC8A':'#ff7b7b'});
  shake=6; ensureAnim();
}
// 统一动画循环：相机缓动 + 特效推进 + 天气粒子；任一活跃则持续，全静则停（省电）
function animLoop(ts){
  if(!rafOn) return;
  if(camEase){ camX += (camTX-camX)*0.18; camY += (camTY-camY)*0.18; if(Math.abs(camTX-camX)<0.5 && Math.abs(camTY-camY)<0.5){ camX=camTX; camY=camTY; camEase=false; } }
  if(weatherKey!=='sun'){ weatherPhase=(weatherPhase+1)%100000; }
  if(shake>0) shake=Math.max(0, shake-0.4);
  for(let i=fxList.length-1;i>=0;i--){ fxList[i].t++; if(fxList[i].t>=fxList[i].life) fxList.splice(i,1); }
  render();
  const active = camEase || fxList.length>0 || weatherKey!=='sun';
  if(active) requestAnimationFrame(animLoop); else rafOn=false;
}
function ensureAnim(){ if(!rafOn){ rafOn=true; requestAnimationFrame(animLoop); } }
function updateWeatherAnim(){ ensureAnim(); }   // 兼容既有调用（btnTime / 初始化）

// ---- 交互 ----
function screenToCell(cx,cy){ const r=cv.getBoundingClientRect(); const sx=cx-r.left, sy=cy-r.top;
  if(sx<0||sy<0||sx>cv.width||sy>cv.height) return null;
  const wx=camX+sx, wy=camY+sy; const x=Math.floor(wx/CS), y=Math.floor(wy/CS);
  return (x>=0&&x<W&&y>=0&&y<H)?{x,y}:null; }

// 触控
let tStart=null, last=null, pinch=null, moved=0, t0=0;
cv.addEventListener('touchstart',e=>{ e.preventDefault();
  if(e.touches.length===1){ const t=e.touches[0]; tStart={x:t.clientX,y:t.clientY}; last={x:t.clientX,y:t.clientY}; moved=0; t0=Date.now(); }
  else if(e.touches.length===2){ pinch={d:dist(e.touches),camX,camY}; }
},{passive:false});
cv.addEventListener('touchmove',e=>{ e.preventDefault();
  if(e.touches.length===1&&last){ const t=e.touches[0]; const dx=t.clientX-last.x, dy=t.clientY-last.y;
    camX-=dx; camY-=dy; moved+=Math.abs(dx)+Math.abs(dy); last={x:t.clientX,y:t.clientY}; clampCam(); render(); }
  else if(e.touches.length===2&&pinch){ const d=dist(e.touches); const nz=clampZoom(zoom*d/pinch.d); zoom=nz; pinch.d=d; clampCam(); render(); }
},{passive:false});
cv.addEventListener('touchend',e=>{ e.preventDefault();
  if(tStart&&moved<12&&Date.now()-t0<350){ const c=screenToCell(tStart.x,tStart.y); if(c) handleTap(c.x,c.y); }
  tStart=last=pinch=null;
},{passive:false});
function dist(ts){ const a=ts[0],b=ts[1]; return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY); }

// 鼠标（桌面调试）
let mDown=false,mLast=null,mMoved=0;
cv.addEventListener('mousedown',e=>{ mDown=true; mMoved=0; mLast={x:e.clientX,y:e.clientY}; });
cv.addEventListener('mousemove',e=>{ if(mDown){ const dx=e.clientX-mLast.x,dy=e.clientY-mLast.y; camX-=dx; camY-=dy; mMoved+=Math.abs(dx)+Math.abs(dy); mLast={x:e.clientX,y:e.clientY}; clampCam(); render(); }
  else { const c=screenToCell(e.clientX,e.clientY); if(c) hoverInfo(c.x,c.y); } });
cv.addEventListener('mouseup',e=>{ if(mDown&&mMoved<12){ const c=screenToCell(e.clientX,e.clientY); if(c) handleTap(c.x,c.y); } mDown=false; });
cv.addEventListener('wheel',e=>{ e.preventDefault(); zoom=clampZoom(zoom*(e.deltaY<0?1.1:0.9)); clampCam(); render(); },{passive:false});
function clampZoom(z){ return Math.max(0.6,Math.min(3,z)); }

// ---- 点击处理 ----
function handleTap(x,y){
  const c=map[y][x];
  if(ambushMode){
    if(c.owner!=='player'&&c.t==='forest'&&validTarget(x,y)){ c.ambush=true; c.owner='player'; toast('森林伏兵已布置（潜伏）'); openSheet(); }
    else if(c.t!=='forest') toast('伏兵需布在森林地块');
    render(); return;
  }
  if(floodMode){
    if(c.t!=='lowland') toast('水攻只能用于低洼地块');
    else if(!c.upstream) toast('需先占领该低洼旁的上游河流');
    else { const w=R.WEATHER[weatherKey];
      if(w.flood<=0) toast('天旱水枯，水攻无效（需雨/融雪）');
      else { const d=R.startFlood(c,weatherKey); toast(`🌊 水攻发动！水势将持续 ${d} 回合，敌军逐步被淹`); refreshTop(); } }
    render(); return;
  }
  if(c.owner==='player'){ showInfo(x,y); return; }
  if(diplomacyMode){
    if(isAI(c.owner)) openDiplomacy(c.owner);
    else if(c.owner==='player') showInfo(x,y);
    else toast('外交只能对诸侯势力操作（点对应颜色地块）');
    return;
  }
  if(isAI(c.owner) && R.isAlly(DIP,'player',c.owner)){ toast('不可进攻盟友（'+lordById(c.owner).name+'）'); return; }
  if(!validTarget(x,y)){ toast('只能进攻与领地相邻的地块'); return; }
  doBattle(x,y);
}
function showInfo(x,y){ const c=map[y][x];
  document.getElementById('info').innerHTML=`地形【${R.TERRAIN[c.t].name}】｜归属：${c.owner==='player'?'我方':isAI(c.owner)?'敌军':'中立'}｜守军：${c.soldiers||0}${c.upstream?'｜⚠️可水攻':''}`;
  openSheet();
}
function hoverInfo(x,y){ const c=map[y][x];   // 桌面悬浮预览（不弹面板）
  if(!scouted(x,y)){ document.getElementById('info').innerHTML='迷雾区域（未侦察）'; return; }
  document.getElementById('info').innerHTML=`地形【${R.TERRAIN[c.t].name}】｜${c.owner==='player'?'我方':isAI(c.owner)?'敌军':'中立'}｜守军：${c.soldiers||0}${validTarget(x,y)?'｜🎯可进攻':''}${c.upstream?'｜⚠️可水攻':''}`;
}

// ---- 战斗 ----
function doBattle(x,y){
  if(gameOver){ toast('本局已结束，点「剧本」重开'); return; }
  const c=map[y][x]; const lvl=c.lvl;
  // 伏兵：从相邻我方伏兵格发动（修正原"伏兵永不触发"缺陷）
  let ambushSrc=null;
  for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){ const n=map[y+dy]&&map[y+dy][x+dx]; if(n&&n.owner==='player'&&n.ambush){ ambushSrc=n; break; } }
  const det = ambushSrc ? R.ambushDetect(ambushSrc.t,weatherKey,0.3) : false;
  const ambush = !!ambushSrc && det;
  const ambushFailed = !!ambushSrc && !det;
  if(ambushSrc) ambushSrc.ambush=false;   // 伏兵发动或暴露后清除
  const ms=R.miaoSuan({weather:weatherKey,attTerrain:'plain',defTerrain:c.t,attMorale:85,leadAvg:92});
  document.getElementById('miao').innerHTML=`<div class="score"><div>天时<b>${ms.tianshi}</b></div><div>地利<b>${ms.dili}</b></div><div>人和<b>${ms.renhe}</b></div></div><div class="hint">预测胜率 ${ms.winProb}% ｜【${R.TERRAIN[c.t].name}】·【${R.WEATHER[weatherKey].name}】${ambush?'｜⚔️伏击成功':(ambushFailed?'｜⚠️伏兵被识破':'')}</div>`;
  const att=ROSTER.slice(0,3).map((id,i)=>R.makeUnit(id,1400,i===0?'fengshi':(i===1?'heyi':'yulin'),{morale:85}));
  const res=R.simulateCombat(att, defenderArmy(c).units, {terrain:c.t, weather:weatherKey, ambush, ambushFailed, floodActive:c.floodTurns>0});
  log(`⚔️ 出征【${R.TERRAIN[c.t].name}】vs 守军(Lv${lvl}) → <b class="${res.result.includes('攻')?'win':'lose'}">${res.result}</b>`);
  res.log.slice(0,10).forEach(l=>log('· '+l));
  if(res.result.includes('攻')){ c.owner='player'; c.lvl=0; c.soldiers=0; c.ambush=false; c.upstream=false; log('✅ 占领成功，领地扩张！'); }
  else { const loss=Math.round(c.soldiers*0.15); c.soldiers=Math.max(0,c.soldiers-loss); log('❌ 受挫，守军-'+loss+'，可再攻。'); }
  addBattleFx(x,y,res); panTo(x,y);
  updateUpstream(); refreshTop(); render(); openSheet();
}

// ---- UI ----
function log(t,cls){ const el=document.getElementById('log'); const d=document.createElement('div'); if(cls)d.className=cls; d.innerHTML=t; el.prepend(d); }
function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1600); }
function openSheet(){ document.getElementById('sheet').classList.add('show'); }
function closeSheet(){ document.getElementById('sheet').classList.remove('show'); }
// 外交面板：列出各诸侯与玩家关系，可切换 同盟/中立/敌对/附庸，敌对时可议和（信誉影响）
function relLabel(s){ return s==='ally'?'同盟':s==='rival'?'敌对':s==='vassal'?'附庸':'中立'; }
function openDiplomacy(focus){
  const el=document.getElementById('dipBody');
  el.innerHTML = AI_LORDS.map(L=>{
    const s=R.getRelation(DIP,'player',L.id);
    const allyOn=s==='ally'?'on':'', neuOn=s==='neutral'?'on':'', warOn=s==='rival'?'on':'', vasOn=s==='vassal'?'on':'';
    const peace = s==='rival' ? `<button class="peace" data-b="${L.id}" data-action="peace">议和(${Math.round(R.peaceAcceptChance(DIP,'player',L.id,reputation)*100)}%)</button>` : '';
    const hl = (focus===L.id) ? ' style="outline:2px solid #b9a8ff"' : '';
    return `<div class="dipRow"${hl}><div class="dipTitle"><b style="color:${L.color}">${L.name}</b> <span class="tag">${L.personality}</span> <span class="tag">关系：${relLabel(s)}</span></div>`
      + `<div class="dipBtns"><button class="${allyOn}" data-b="${L.id}" data-s="ally">同盟</button>`
      + `<button class="${neuOn}" data-b="${L.id}" data-s="neutral">中立</button>`
      + `<button class="rival ${warOn}" data-b="${L.id}" data-s="war">敌对</button>`
      + `<button class="vas ${vasOn}" data-b="${L.id}" data-s="vassal">附庸</button>${peace}</div></div>`;
  }).join('')
    + `<div class="dipNote" style="margin-top:6px">信誉：${reputation} ｜ 同盟/附庸=互不侵犯；敌对=你与盟友优先夹击该诸侯（拉一个 AI 打另一个）。议和成功率随信誉提高。</div>`;
  document.getElementById('dipSheet').classList.add('show');
}
function closeDiplomacy(){ document.getElementById('dipSheet').classList.remove('show'); }
document.getElementById('dipBody').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  const L=lordById(b.dataset.b);
  if(b.dataset.action==='peace'){ playerSuePeace(L); return; }
  playerSetRel(b.dataset.b, b.dataset.s);
  toast('已与【'+L.name+'】设为'+relLabel(b.dataset.s==='war'?'rival':(b.dataset.s==='vassal'?'vassal':b.dataset.s)));
});
function playerSuePeace(L){
  const s=R.getRelation(DIP,'player',L.id);
  if(s!=='rival'){ toast('当前并非敌对，无需议和'); return; }
  const ch=R.peaceAcceptChance(DIP,'player',L.id,reputation);
  if(Math.random()<ch){ R.setRelation(DIP,'player',L.id,'neutral'); toast('🕊️ 【'+L.name+'】接受议和，双方罢兵'); log('🕊️ 与【'+L.name+'】议和成功'); reputation=Math.min(100,reputation+2); }
  else { toast('❌ 【'+L.name+'】拒绝议和（信誉不足）'); log('❌ 议和被【'+L.name+'】拒绝'); reputation=Math.max(0,reputation-3); }
  openDiplomacy();
}

// 剧本事件 / 胜负判定
function applyEvent(ev){
  if(ev.type==='rivalAll' || ev.type==='allyAll'){
    const msg=R.applyScenarioEvent(DIP, ev);   // 关系变更（众矢之的 / 自动结盟讨贼）
    log('📜 '+msg,'win'); toast(ev.msg||msg);
    return;
  }
  if(ev.type==='buffLord'){
    const L=lordById(ev.target);
    if(L){ L.strength=Math.min(3200, L.strength+(ev.amount||300)); log('📜 【'+L.name+'】'+ (ev.msg||'实力大增')); toast(ev.msg||L.name+'实力大增'); }
    return;
  }
  if(ev.type==='spawnArmy'){ log('📜 '+(ev.msg||'敌军增援抵达')); toast(ev.msg||'敌军增援抵达'); return; }
}
function landCount(owner){ let n=0; for(let y=0;y<H;y++)for(let x=0;x<W;x++){ if(map[y][x].owner===owner) n++; } return n; }
function checkEnd(){
  if(!SCN||gameOver) return;
  const land=landCount('player');
  if(land<=0){ endGame('lose','你的势力已被全灭'); return; }
  if(SCN.victory.type==='defeatLord' && landCount(SCN.victory.lordId)===0){ endGame('win','已讨灭 '+lordById(SCN.victory.lordId).name+'！'); return; }
  const landGoal = SCN.victory.n || SCN.victory.land;
  if(landGoal && land>=landGoal){ endGame('win','占领 '+land+' 州郡，霸业有成！'); return; }
}
function endGame(res,msg){ gameOver=true; rafOn=false; log((res==='win'?'🏆 胜利':'💀 失败')+'：'+msg, res==='win'?'win':'lose'); toast((res==='win'?'🏆 ':'💀 ')+msg+'（点「剧本」重开）'); }
// 剧本选择面板
function victoryText(s){ if(s.victory.type==='defeatLord'){ const tl=s.lords.find(l=>l.id===s.victory.lordId); return '击灭'+(tl?tl.name:s.victory.lordId); } return '占领 '+s.victory.n+' 州郡'; }
function openScenario(){
  const el=document.getElementById('scnBody');
  el.innerHTML = R.SCENARIOS.map(s=>{ const on = SCN && SCN.id===s.id ? 'on':'';
    return `<div class="dipRow"><div class="dipTitle"><b>${s.name}</b></div><div class="dipNote">${s.desc}　目标：${victoryText(s)}</div><button class="scnPick ${on}" data-id="${s.id}">选择此剧本</button></div>`;
  }).join('');
  document.getElementById('scnSheet').classList.add('show');
}
function closeScenario(){ document.getElementById('scnSheet').classList.remove('show'); }
document.getElementById('scnBody').addEventListener('click', e=>{ const b=e.target.closest('button'); if(!b) return; startScenario(b.dataset.id); });
function refreshTop(){ let land=0,enemy=0; for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const o=map[y][x].owner; if(o==='player')land++; else if(o!=='none')enemy++; }
  document.getElementById('tLand').textContent='领地'+land;
  document.getElementById('tEnemy').textContent='敌'+enemy;
  document.getElementById('tSeason').textContent=R.SEASON[seasonKey].name;
  document.getElementById('tWeather').textContent=R.WEATHER[weatherKey].name;
  document.getElementById('tTime').textContent='时辰'+time;
}
function standings(){ const cnt={}; for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const o=map[y][x].owner; if(o!=='none') cnt[o]=(cnt[o]||0)+1; }
  const nm=o=>o==='player'?'我方':(lordById(o)?lordById(o).name:o);
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(([o,n])=>nm(o)+' '+n).join(' · '); }
function buildLegend(){ let h=TK.map(k=>`<span><i style="background:${R.TERRAIN[k].color}"></i>${R.TERRAIN[k].name}</span>`).join('');
  h+=`<div style="grid-column:1/-1;margin-top:4px">势力：`+
     `<span><i style="background:#3c82dc"></i>我方</span>`+
     AI_LORDS.map(L=>`<span><i style="background:${L.color}"></i>${L.name}</span>`).join('')+`</div>`;
  document.getElementById('legend').innerHTML=h; }
function resize(){ cv.width=wrap.clientWidth; cv.height=wrap.clientHeight; clampCam(); render(); }
window.addEventListener('resize',resize);
window.closeSheet=closeSheet;
window.closeDiplomacy=closeDiplomacy;
window.closeScenario=closeScenario;

document.getElementById('btnTime').onclick=()=>{
  if(gameOver){ toast('本局已结束，点「剧本」重开'); return; }
  time++; seasonKey=['spring','summer','autumn','winter'][Math.floor(time/3)%4]; weatherKey=pickW(R.SEASON[seasonKey].w);
  aiTurn();
  // 剧本事件触发（每个事件仅触发一次）
  R.eventsDueAt(SCN,time).forEach(ev=>{ if(appliedEvents[ev.at]) return; appliedEvents[ev.at]=true; applyEvent(ev); });
  refreshTop(); checkEnd(); render(); updateWeatherAnim();
  toast(`进入【${R.SEASON[seasonKey].name}】· 天气【${R.WEATHER[weatherKey].name}】· 诸侯已行动`);
  log('📊 势力：'+standings());
};
document.getElementById('btnAmbush').onclick=function(){ ambushMode=!ambushMode; floodMode=false; diplomacyMode=false; this.classList.toggle('on',ambushMode); document.getElementById('btnFlood').classList.remove('on'); document.getElementById('btnDiplomacy').classList.remove('on'); closeDiplomacy(); closeScenario(); toast(ambushMode?'伏兵模式：点森林布伏':'已退出伏兵'); };
document.getElementById('btnFlood').onclick=function(){ floodMode=!floodMode; ambushMode=false; diplomacyMode=false; this.classList.toggle('on',floodMode); document.getElementById('btnAmbush').classList.remove('on'); document.getElementById('btnDiplomacy').classList.remove('on'); closeDiplomacy(); closeScenario(); toast(floodMode?'水攻模式：点低洼放水':'已退出水攻'); };
document.getElementById('btnDiplomacy').onclick=function(){ diplomacyMode=!diplomacyMode; ambushMode=false; floodMode=false; this.classList.toggle('on',diplomacyMode); document.getElementById('btnAmbush').classList.remove('on'); document.getElementById('btnFlood').classList.remove('on'); closeScenario(); if(diplomacyMode){ openDiplomacy(); toast('外交模式：点诸侯地块可结盟/敌对'); } else { closeDiplomacy(); toast('已退出外交'); } };
document.getElementById('btnScenario').onclick=function(){ openScenario(); closeDiplomacy(); };
document.getElementById('btnReload').onclick=async function(){ try{ await R.loadConfigFromServer('data/'); refreshDataRefs(); buildLegend(); refreshTop(); render(); toast('配表已重载，数值即时生效'); }catch(e){ toast('配表重载失败（请用 http 服务运行）：'+e.message); } };
document.getElementById('btnReset').onclick=()=>{ genMap(); buildLegend(); toast('地图已重置'); };

resize();                 // 先按容器尺寸初始化画布
startScenario('melee');    // 生成地图、居中、渲染、关闭面板
updateWeatherAnim();
toast('点黄色地块出征；拖动平移，双指缩放；点“外交”结盟诸侯；点“剧本”换剧本');
</script>
</body>
</html>
